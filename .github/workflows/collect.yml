name: collect

# Serverless data collection — replaces the local PC scheduled task.
# Runs every 15 min, updates the forward paper-trading ledger from live BTC data,
# and commits ONLY when the ledger actually changes (composite_score is selective,
# so this is a few commits/day, not 96 — keeps the repo + Streamlit redeploys quiet).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r automation/requirements.txt
      - run: python automation/collect.py
      - name: commit ledger if changed
        run: |
          git config user.name "btc-bot[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_ledger.csv
          git diff --cached --quiet || git commit -m "data: live ledger $(date -u +%FT%TZ)"
          git push
